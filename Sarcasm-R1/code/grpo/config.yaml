# Sarcasm-R1 GRPO Training Configuration (v5 — Qwen2.5-7B-Instruct)

model_name_or_path: Qwen/Qwen2.5-7B-Instruct
model_revision: main
torch_dtype: bfloat16

# Training
bf16: true
do_eval: false
use_vllm: false
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 3.0e-06
log_level: info
logging_steps: 10
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 512
max_completion_length: 512
max_steps: 200
num_train_epochs: 1
num_generations: 8
generation_batch_size: 8
output_dir: ./output/sarcasm-r1-v5
overwrite_output_dir: true
per_device_train_batch_size: 1
report_to:
- none
save_strategy: steps
save_steps: 20
save_total_limit: 20
seed: 42
warmup_ratio: 0.1
