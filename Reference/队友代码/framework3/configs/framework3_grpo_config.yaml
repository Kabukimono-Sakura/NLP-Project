# Framework3 Hybrid GRPO configuration for Qwen3-14B.
# Override any value from the command line, for example:
#   --max_steps 200 --num_generations 8

model_name_or_path: models/Qwen3-14B
model_revision: main
torch_dtype: bfloat16
trust_remote_code: true

# LoRA keeps Qwen3-14B training realistic on common AutoDL single-GPU setups.
use_peft: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
- q_proj
- k_proj
- v_proj
- o_proj
- gate_proj
- up_proj
- down_proj

bf16: true
do_eval: false
use_vllm: false
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 3.0e-06
log_level: info
logging_steps: 10
logging_strategy: steps
lr_scheduler_type: cosine
max_prompt_length: 512
max_completion_length: 512
max_steps: 200
num_train_epochs: 1
num_generations: 4
generation_batch_size: 4
output_dir: framework3/checkpoints/framework3-hybrid-grpo-qwen3-14b
overwrite_output_dir: true
per_device_train_batch_size: 1
report_to:
- none
save_strategy: steps
save_steps: 20
save_total_limit: 5
seed: 42
warmup_ratio: 0.1
